<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المفضلة | Matrix Housing</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --matrix-green: #00ff00; --glass: rgba(255, 255, 255, 0.05); }
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .header { padding: 20px; background: var(--glass); border-radius: 15px; text-align: center; border: 1px solid var(--matrix-green); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--glass); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-view { background: var(--matrix-green); color: black; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>قائمة مفضلاتي 💚</h2>
    </div>

    <div class="grid" id="favorites-grid">
        <p>جاري تحميل محفوظاتك من الماتركس...</p>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        async function loadFavorites() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            // جلب المفضلات المرتبطة بالمستخدم
            const { data: favs, error } = await supabaseClient
                .from('favorites')
                .select('property_id, properties(*)')
                .eq('user_id', user.id);

            const grid = document.getElementById('favorites-grid');
            grid.innerHTML = '';

            if (favs && favs.length > 0) {
                favs.forEach(item => {
                    const p = item.properties;
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${p.image_url || 'https://via.placeholder.com/300'}" style="width:100%; border-radius:10px;">
                            <h4>${p.title}</h4>
                            <p>${p.location}</p>
                            <button class="btn-view" onclick="location.href='property-details.html?id=${p.id}'">عرض التفاصيل</button>
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = '<p>لم تقم بحفظ أي شقق بعد.</p>';
            }
        }
        loadFavorites();
    </script>
</body>
</html>
