<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل العقار | Matrix Housing</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --matrix-green: #00ff00; --glass: rgba(255, 255, 255, 0.05); }
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
        .details-container { max-width: 600px; margin: auto; background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(0,255,0,0.2); overflow: hidden; }
        .img-banner { width: 100%; height: 250px; object-fit: cover; }
        .info-content { padding: 20px; }
        .price-tag { font-size: 1.5rem; color: var(--matrix-green); font-weight: bold; margin-bottom: 15px; }
        .description { line-height: 1.8; opacity: 0.9; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .btn-chat { background: var(--matrix-green); color: black; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .back-link { display: block; text-align: center; color: white; opacity: 0.6; margin-top: 20px; text-decoration: none; }
    </style>
</head>
<body>

    <div class="details-container" id="details-view">
        <p style="padding: 20px;">جاري تحميل بيانات الشقة من الماتركس...</p>
    </div>

    <a href="dashboard.html" class="back-link">← العودة للرئيسية</a>

    <script src="js/supabase-config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('id');

        async function fetchDetails() {
            if (!propertyId) return;

            const { data: item, error } = await supabaseClient
                .from('properties')
                .select('*, profiles(email)')
                .eq('id', propertyId)
                .single();

            if (item) {
                document.getElementById('details-view').innerHTML = `
                    <img src="${item.image_url || 'https://via.placeholder.com/600x400'}" class="img-banner">
                    <div class="info-content">
                        <div class="price-tag">${item.price} ج.م / شهر</div>
                        <h2>${item.title}</h2>
                        <p style="color: #00ff00;">📍 ${item.location}</p>
                        <div class="description">${item.description}</div>
                        
                        <button class="btn-chat" onclick="startChat('${item.owner_id}')">
                            💬 تواصل مع صاحب السكن
                        </button>
                    </div>
                `;
            }
        }

        function startChat(ownerId) {
            // توجيه لصفحة الشات مع تمرير رقم صاحب السكن
            window.location.href = `chat.html?receiver=${ownerId}`;
        }

        fetchDetails();
    </script>
</body>
</html>
