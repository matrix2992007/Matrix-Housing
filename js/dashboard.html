<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Matrix Housing</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --matrix-green: #00ff00; --glass: rgba(255, 255, 255, 0.05); }
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--glass); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(0,255,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--glass); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card:hover { border-color: var(--matrix-green); transform: translateY(-5px); }
        .price { color: var(--matrix-green); font-weight: bold; font-size: 1.2rem; }
        .btn-add { background: var(--matrix-green); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #owner-section { display: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>لوحة تحكم MATRIX</h2>
        <button class="btn-add" onclick="signOut()">تسجيل خروج</button>
    </div>

    <div id="owner-section">
        <button class="btn-add" onclick="location.href='add-property.html'">+ إضافة شقة جديدة</button>
    </div>

    <div class="content">
        <h3>الشقق المتاحة في العريش</h3>
        <div class="grid" id="properties-grid">
            <p id="loading-text">جاري تحميل العقارات...</p>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // التأكد من تسجيل الدخول وجلب البيانات
        async function loadDashboard() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = "auth.html"; return; }

            // جلب دور المستخدم (طالب أم صاحب سكن)
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .single();

            if (profile && profile.role === 'owner') {
                document.getElementById('owner-section').style.display = 'block';
            }

            loadProperties();
        }

        async function loadProperties() {
            const { data: properties, error } = await supabaseClient
                .from('properties')
                .select('*');

            const grid = document.getElementById('properties-grid');
            grid.innerHTML = '';

            if (properties && properties.length > 0) {
                properties.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${item.image_url || 'https://via.placeholder.com/300'}" style="width:100%; border-radius:10px;">
                            <h4>${item.title}</h4>
                            <p>${item.location}</p>
                            <div class="price">${item.price} ج.م / شهر</div>
                            <button class="btn-add" style="width:100%; margin-top:10px;" onclick="viewDetails('${item.id}')">تفاصيل</button>
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = '<p>لا توجد شقق معروضة حالياً.</p>';
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        loadDashboard();
    </script>
</body>
</html>
