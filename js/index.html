<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Housing | ماتركس للسكن</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --matrix-green: #00ff00; --glass: rgba(255, 255, 255, 0.07); }
        body {
            background: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #0a1a0a 0%, #050505 100%);
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            margin-top: 100px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        h1 { color: var(--matrix-green); font-size: 2.5rem; margin-bottom: 10px; letter-spacing: 2px; }
        p { opacity: 0.8; line-height: 1.6; }
        .btn-main {
            background: var(--matrix-green);
            color: black;
            border: none;
            padding: 15px 35px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 25px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>MATRIX</h1>
        <p>مرحباً بك في نظام السكن الذكي بالعريش.<br>ادخل إلى الماتركس وابحث عن سكنك بسهولة.</p>
        
        <a href="auth.html" class="btn-main">ابدأ الآن</a>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/security-guard.js"></script>
</body>
</html>
