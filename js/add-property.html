<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة عقار | Matrix Housing</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .form-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid #00ff00; width: 100%; max-width: 450px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; }
        .btn-submit { background: #00ff00; color: black; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        h2 { color: #00ff00; text-align: center; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>إضافة شقة جديدة</h2>
        <input type="text" id="title" placeholder="عنوان الإعلان (مثلاً: شقة لقطة بجوار الجامعة)">
        <input type="text" id="location" placeholder="المكان (أبو صقل، المساعيد، إلخ)">
        <input type="number" id="price" placeholder="السعر الشهري (ج.م)">
        <textarea id="description" rows="4" placeholder="وصف التفاصيل (الدور، عدد الغرف، الخدمات)"></textarea>
        <input type="text" id="image-url" placeholder="رابط صورة الشقة (مؤقتاً)">
        
        <button class="btn-submit" onclick="addNewProperty()">نشر الإعلان في الماتركس</button>
        <button onclick="location.href='dashboard.html'" style="background:none; color:white; border:none; width:100%; margin-top:10px; cursor:pointer;">إلغاء والعودة</button>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        async function addNewProperty() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            const propertyData = {
                owner_id: user.id,
                title: document.getElementById('title').value,
                location: document.getElementById('location').value,
                price: document.getElementById('price').value,
                description: document.getElementById('description').value,
                image_url: document.getElementById('image-url').value,
                created_at: new Date()
            };

            const { error } = await supabaseClient.from('properties').insert([propertyData]);

            if (error) alert("خطأ في النشر: " + error.message);
            else {
                alert("تم نشر الشقة بنجاح في العريش!");
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
