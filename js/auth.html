<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Matrix Housing</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body {
            background: #050505; color: white; font-family: sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(0, 255, 0, 0.2);
            width: 90%; max-width: 350px; text-align: center;
        }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid #333; background: #111; color: white; box-sizing: border-box;
        }
        .btn-auth {
            background: #00ff00; color: black; border: none; width: 100%;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        h2 { color: #00ff00; }
        .switch-link { margin-top: 15px; font-size: 0.9rem; opacity: 0.7; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-card" id="auth-container">
        <h2 id="auth-title">إنشاء حساب جديد</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        
        <select id="user-role">
            <option value="student">أنا طالب (أبحث عن سكن)</option>
            <option value="owner">أنا صاحب سكن (أعرض عقار)</option>
        </select>

        <button class="btn-auth" onclick="handleAuth()">تأكيد</button>
        <p class="switch-link" onclick="toggleAuth()">لديك حساب بالفعل؟ سجل دخولك</p>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        let isSignUp = true;

        function toggleAuth() {
            isSignUp = !isSignUp;
            document.getElementById('auth-title').innerText = isSignUp ? "إنشاء حساب جديد" : "تسجيل الدخول";
            document.getElementById('user-role').style.display = isSignUp ? "block" : "none";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('user-role').value;

            if (isSignUp) {
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) alert(error.message);
                else {
                    alert("تم إنشاء الحساب! تفقد بريدك الإلكتروني.");
                    // هنا بنسجل نوع المستخدم في الداتابيز (خطوة جاية)
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
